# ============================================================
# Bloque nginx para s10bizsmarthub.bizwareapps.com
# Agregar dentro del bloque http {} del nginx.conf del VPS
# SSL: ejecutar primero:
#   certbot --nginx -d s10bizsmarthub.bizwareapps.com
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name s10bizsmarthub.bizwareapps.com;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name s10bizsmarthub.bizwareapps.com;

    # SSL — generado por certbot
    ssl_certificate /etc/letsencrypt/live/s10bizsmarthub.bizwareapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s10bizsmarthub.bizwareapps.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    resolver 127.0.0.11 valid=30s;

    # Frontend Next.js
    location / {
        set $s10_frontend s10biz-web;
        proxy_pass http://$s10_frontend:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # Backend NestJS
    location /api/ {
        set $s10_backend s10biz-api;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$s10_backend:3202;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # Activos estáticos (cache 7 días)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        set $s10_frontend s10biz-web;
        proxy_pass http://$s10_frontend:3100;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}
