services:
  s10biz-db:
    image: postgres:15-alpine
    container_name: s10biz-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=7949413b5c1997927dd3b57c
      - POSTGRES_DB=s10biz_db
    volumes:
      - s10biz_db_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app_default

  s10biz-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: s10biz-api
    expose:
      - 3202
    env_file:
      - ./backend/.env
    restart: always
    # PID 1 sin handler ignora SIGTERM -> Docker mata con SIGKILL a los 10s (exit 137)
    # y un recreate a medias deja el contenedor viejo renombrado -> 502. Ver CLAUDE.md #23.
    init: true
    stop_grace_period: 30s
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - s10biz-db
    networks:
      - app_default

  s10biz-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://s10biz.bizwareapps-dev.com/api
    container_name: s10biz-web
    expose:
      - 3100
    environment:
      - NEXT_PUBLIC_API_URL=https://s10biz.bizwareapps-dev.com/api
      - NODE_ENV=production
      - PORT=3100
    restart: always
    depends_on:
      - s10biz-backend
    networks:
      - app_default

networks:
  app_default:
    external: true

volumes:
  s10biz_db_data:
    name: dev-s10bizsmarthub_s10biz_db_data
