<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1424"/>
      <stop offset="100%" stop-color="#050a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#207E83"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="trend" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Glow circle -->
  <circle cx="256" cy="256" r="180" fill="url(#accent)" opacity="0.12"/>
  <!-- Chart bars -->
  <rect x="100" y="310" width="60" height="110" rx="8" fill="url(#accent)" opacity="0.7"/>
  <rect x="186" y="250" width="60" height="170" rx="8" fill="url(#accent)" opacity="0.85"/>
  <rect x="272" y="200" width="60" height="220" rx="8" fill="url(#accent)" opacity="0.95"/>
  <rect x="358" y="145" width="60" height="275" rx="8" fill="url(#accent)"/>
  <!-- Trend line -->
  <polyline points="130,305 216,245 302,195 388,140"
    stroke="url(#trend)" stroke-width="10" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend dots -->
  <circle cx="130" cy="305" r="8" fill="#F59E0B"/>
  <circle cx="216" cy="245" r="8" fill="#F59E0B"/>
  <circle cx="302" cy="195" r="8" fill="#F59E0B"/>
  <circle cx="388" cy="140" r="10" fill="#FBBF24"/>
  <!-- "S" watermark -->
  <text x="256" y="480" text-anchor="middle"
    font-family="system-ui, sans-serif" font-size="28" font-weight="900"
    fill="rgba(255,255,255,0.15)" letter-spacing="2">S10 BizSmartHub</text>
</svg>
